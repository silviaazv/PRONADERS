<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PRONADERS — Dashboard Logística</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

<link rel="stylesheet" href="dashboard-logistica.css">
</head>
<body>

<!-- Todo el contenido de esta página se genera dinámicamente desde
     dashboard-logistica.js: métricas, despachos pendientes e historial,
     para poder mostrar la logística de todos los equipos por zona
     (no solo el equipo del centro) cuando el Admin de Oficina la consulta. -->
<main class="main" id="main-logistica"></main>

<!-- Modal de detalle de despacho/solicitud: se abre SIN cambiar de
     módulo (ni navegar a solicitudes.html), tanto desde "Despachos
     Pendientes" como desde el "Historial de Despachos". -->
<div class="modal-overlay" id="modal-info-despacho">
  <div class="modal">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px">
      <div id="mid-titulo" style="font-family:var(--font-serif);font-size:20px;font-weight:300;color:var(--navy)"></div>
      <button class="close-btn" onclick="document.getElementById('modal-info-despacho').classList.remove('open')">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>
    <div id="mid-body"></div>
  </div>
</div>

<script src="shared.js"></script>
<script src="dashboard-logistica.js"></script>
</body>
</html>
