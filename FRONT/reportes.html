<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PRONADERS — Reportes de Avance</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

<link rel="stylesheet" href="reportes.css">
</head>
<body>


<main class="main">

  <div class="flex-between mb-24 fade-up fade-up-1">
    <div class="section-head" style="margin-bottom:0">
      <h2>Reportes de <em style="font-style:italic">Avance</em></h2>
      <p>Registra y consulta el progreso de los proyectos</p>
    </div>
    <button class="btn btn-gold" id="btn-nuevo-reporte" onclick="document.getElementById('modal-reporte').classList.add('open')">
      <span class="material-symbols-rounded">add</span> Nuevo Reporte
    </button>
  </div>

  <!-- FILTROS EN LÍNEA (selects, no pestañas ni ventanas): estado,
       proyecto y orden por fecha. Alineados a la derecha, con
       "Limpiar filtros" a la izquierda solo cuando hay filtros activos.
       La barra queda fija al hacer scroll. -->
  <div class="card mb-20 fade-up fade-up-1 filtros-sticky" style="padding:12px 18px">
    <div style="display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap">
      <span class="text-xs text-muted" id="rep-contador" style="margin-right:auto"></span>
      <button class="btn btn-outline btn-sm" id="btn-limpiar-rep" onclick="limpiarFiltrosReportes()" style="display:none;white-space:nowrap">
        <span class="material-symbols-rounded" style="font-size:13px">clear</span> Limpiar filtros
      </button>
      <select class="form-control" id="f-rep-estado" style="width:auto;padding:7px 32px 7px 12px;font-size:13px" onchange="renderReportes()">
        <option value="">Todos</option>
        <option value="Pendiente" selected>Pendientes</option>
        <option value="Aprobado">Revisados</option>
      </select>
      <select class="form-control" id="f-rep-proyecto" style="width:auto;padding:7px 32px 7px 12px;font-size:13px" onchange="renderReportes()">
        <option value="">Todos los proyectos</option>
      </select>
      <select class="form-control" id="f-rep-orden" style="width:auto;padding:7px 32px 7px 12px;font-size:13px" onchange="renderReportes()" title="Orden por fecha de emisión">
        <option value="desc" selected>Fecha: más recientes</option>
        <option value="asc">Fecha: más antiguos</option>
      </select>
    </div>
  </div>

  <!-- TARJETAS DE REPORTES (estilo tarjetas largas, ordenadas por fecha descendente) -->
  <div id="lista-reportes" style="display:flex;flex-direction:column;gap:18px" class="fade-up fade-up-2"></div>

</main>

<!-- MODAL NUEVO REPORTE -->
<div class="modal-overlay" id="modal-reporte">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nuevo <em style="font-style:italic">Reporte</em></div>
      <button class="close-btn" onclick="document.getElementById('modal-reporte').classList.remove('open')">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">Proyecto</label>
      <select class="form-control" id="rep-proyecto">
        <option>Puente Choluteca</option><option>Riego El Paraíso</option>
        <option>Centro San Pedro</option><option>Escuela Comayagua</option><option>Camino Copán</option>
      </select>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Avance físico</label>
        <div class="flex-between mb-8"><span class="text-xs text-muted">0%</span><span class="range-val" id="val-fisico">68%</span></div>
        <input type="range" min="0" max="100" value="68" oninput="document.getElementById('val-fisico').textContent=this.value+'%'">
      </div>
      <div class="form-group">
        <label class="form-label">Avance financiero</label>
        <div class="flex-between mb-8"><span class="text-xs text-muted">0%</span><span class="range-val" id="val-fin">60%</span></div>
        <input type="range" min="0" max="100" value="60" oninput="document.getElementById('val-fin').textContent=this.value+'%'">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Descripción del avance</label>
      <textarea class="form-control" id="rep-desc" placeholder="Describe el trabajo realizado en este período..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Incidencias</label>
      <textarea class="form-control" style="min-height:70px" placeholder="Problemas o imprevistos encontrados (opcional)..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Observaciones técnicas</label>
      <textarea class="form-control" style="min-height:70px" placeholder="Comentarios adicionales..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Adjuntar evidencias (foto / PDF)</label>
      <div style="border:1.5px dashed var(--cream-dark);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;transition:var(--transition);" onmouseover="this.style.borderColor='#c5c0b5'" onmouseout="this.style.borderColor='var(--cream-dark)'">
        <span class="material-symbols-rounded" style="font-size:28px;display:block;margin-bottom:6px;color:var(--cream-dark)">upload_file</span>
        Arrastra archivos aquí o haz clic para seleccionar
      </div>
    </div>

    <div style="background:var(--info-bg);border-radius:var(--radius);padding:12px 14px;margin-bottom:20px;font-size:12.5px;color:var(--info);display:flex;gap:8px;align-items:center;">
      <span class="material-symbols-rounded" style="font-size:16px">info</span>
      La proyección de finalización se calculará automáticamente al guardar.
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="document.getElementById('modal-reporte').classList.remove('open')">Cancelar</button>
      <button class="btn btn-gold" onclick="enviarReporte()">
        <span class="material-symbols-rounded">send</span> Enviar Reporte
      </button>
    </div>
  </div>
</div>


<!-- Toast para mensajes de registro y errores -->
<div class="toast" id="toast" style="position:fixed;bottom:28px;right:28px;background:var(--navy);color:var(--white);padding:13px 20px;border-radius:var(--radius);font-size:13.5px;display:flex;align-items:center;gap:10px;z-index:1300;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none">
  <span class="material-symbols-rounded" id="toast-icon" style="font-size:18px">check_circle</span>
  <span id="toast-msg"></span>
</div>
<style>.toast.show{transform:translateY(0) !important;opacity:1 !important}</style>


<script src="shared.js"></script>
<script src="reportes.js"></script>
</body>
</html>
